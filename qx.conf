# ==========================================
# Quantumult X 三合一终极稳定版
# 核心架构：Blackmatrix7 (分流) + fmz200 (重写/任务) + As-Lucky (策略/UI)
# 定制功能：Emby排日优选、银行直连、全自动低频测速、强力防 DNS 泄露
# ==========================================

[general]
# --- 1. 基础网络与连通性 ---
server_check_url=http://www.google.com/generate_204
server_check_timeout=2000

# --- 2. 资源解析器 (KOP-XIAO 神器，确保订阅转换与加载) ---
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

# --- 3. UI 增强与归属地显示 (fmz200) ---
profile_img_url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/author/fmz200-01.png
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/fmz200/wool_scripts/main/QuantumultX/scripts/server_location.js

# --- 4. 兼容性排除列表 (防 Fake-IP 冲突：PT站、国内银行、路由器后台) ---
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com, *.m-team.cc, *.local, miwifi.com, tplogin.cn, router.asus.com
excluded_routes=239.255.255.250/32
fallback_udp_policy=direct

[dns]
# --- 5. DNS 防泄露与提速加固 ---
# 禁用系统自带 DNS 及 IPv6，彻底杜绝运营商劫持和泄露
no-system
no-ipv6

# 国内最稳加密 DNS (DoH)
doh-server=https://dns.alidns.com/dns-query

# 专用系统解析 (苹果服务/谷歌下载/路由器局域网地址)
server=/itunes.apple.com/system
server=/apple.com/system
server=/dl.google.com/119.29.29.29
server=/miwifi.com/system
server=/tplogin.cn/system
server=/home/system
server=/routerlogin.net/system

# 基础并发解析支撑
server=223.5.5.5
server=119.29.29.29
server=114.114.114.114

[policy]
# =====================================
# A. 底层自动测速引擎 (低频稳定: 3600s/100ms)
# =====================================
url-latency-benchmark=⚡️ 全局自动, server-tag-regex=.*, check-interval=3600, tolerance=100, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
url-latency-benchmark=⚡️ 香港自动, server-tag-regex=.*(港|HK|Hong), check-interval=3600, tolerance=100, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
url-latency-benchmark=⚡️ 狮城自动, server-tag-regex=.*(新|SG|Singapore|狮城), check-interval=3600, tolerance=100, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
url-latency-benchmark=⚡️ 美国自动, server-tag-regex=.*(美|US|States), check-interval=3600, tolerance=100, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
# 定制需求：Emby 测速严格排除包含“日”、“JP”等字样的节点
url-latency-benchmark=⚡️ Emby自动, server-tag-regex=^(?!.*(日|JP|Japan|Tokyo|Osaka)).*$, check-interval=3600, tolerance=100, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Video.png

# =====================================
# B. 首页核心看板 (融合 As-Lucky 精美图标)
# =====================================
static=🌐 默认代理, ⚡️ 全局自动, ⚡️ 香港自动, ⚡️ 狮城自动, ⚡️ 美国自动, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
static=🎬 Emby服务, ⚡️ Emby自动, 🌐 默认代理, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Movie.png
static=🤖 人工智能, ⚡️ 美国自动, 🌐 默认代理, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png
static=🍎 苹果服务, direct, 🌐 默认代理, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple_1.png
static=🐟 漏网之鱼, direct, 🌐 默认代理, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png

# =====================================
# C. 规则映射与细分策略 (符合 QX 语法，均设多选项)
# =====================================
static=电报消息, 🌐 默认代理, ⚡️ 狮城自动, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
static=海外抖音, ⚡️ 全局自动, ⚡️ 美国自动, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/TikTok.png
static=谷歌服务, 🌐 默认代理, ⚡️ 全局自动, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google.png
static=大陆抖音, direct, 🌐 默认代理, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Tiktok_1.png
static=美国节点, ⚡️ 美国自动, 🌐 默认代理, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
static=proxy, 🌐 默认代理, ⚡️ 全局自动, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png

