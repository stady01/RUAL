dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com, *.m-team.cc, *.local, miwifi.com, tplogin.cn
excluded_routes=239.255.255.250/32
fallback_udp_policy=direct
