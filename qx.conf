[General]
bypass-system = true
skip-proxy = 192.168.0.0/16, 10.0.0.0/8
tun-excluded-routes = 8.8.8.8, 8.8.4.4
loglevel = notify
dns-server = system, 1.1.1.1, 9.9.9.9
ipv6 = false
dns-remote-tls = true
dns-ignore-fail = true
dns-fallback = 119.29.29.29
dns-rule = IP-CIDR,127.0.0.1/32,DIRECT
-blacklist = geosite:category-ads-all, geosite:cn, geosite:private

[UI]
udprelay = true

[Proxy]
# 优选节点组，加入你自己的节点地址订阅链接
# 这里是示例，替换为实际节点配置或订阅链接
优选节点 = select, tag=auto-select, interval=300, url=https://你的订阅链接
节点1 = vmess, server1.example.com, 443, username=uuid-1, tls=true, skip-cert-verify=true
节点2 = vmess, server2.example.com,443, username=uuid-2, tls=true, skip-cert-verify=true
节点3 = ss, server3.example.com, 8388, encrypt-method=aes-128-gcm, password=yourpassword

[Proxy Group]
# 代理组，优选节点组，自动选择速度最快的节点
auto-select = url-test, 优选节点, interval=300, tolerance=150
PROXY = select, auto-select, 节点1, 节点2, 节点3

[URL Rewrite]

[Mitm]
hostname = *.google.com, *.apple.com, *.emby.media
# 需要自动识别和解密 emby 相关请求以进行规则应用

[Script]
# BoxJS 脚本配置，需导入对应的 boxjs.js 脚本文件
boxjs = type=http-response,pattern=^https:\/\/boxjs\.example\.com\/api\/,script-path=boxjs.js,requires-body=true

[Filter]
# 过滤规则，保护隐私，拦截部分追踪请求
# 这里采用 blackmatrix7 的广告、追踪规则范例
AD = reject, url-regex=(ad|track|analytics|doubleclick|google-analytics)

[Policy]
# 保护隐私和安全建议
dns-server =119.29.29.29,1.1.1.1,9.9.9.9
dns-fallback = system
dns-remote-tls = true
bypass-system = true

[Rule]
# 黑名单、白名单
# 排除日本节点访问 emby，emby对应域名和IP在规则中绕过日本节点
DOMAIN-SUFFIX,emby.media,PROXY
IP-CIDR,203.0113.0/24,DIRECT  # 这里示例日本IP段，真实日本IP段需要查找替换
GEOIP,JP,DIRECT   # 对日本IP直接直连，避免走代理节点

# 常用规则合集 - 以收集和绕过国内直连，广告拦截，常见代理使用
FINAL,PROXY

[Filter Remote]
ads = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/ADLite.list, reject
privacy = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/UncheckyAds.list, reject
malware = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/MalwareDomainList.list, reject
