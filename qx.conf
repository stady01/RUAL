[General]
loglevel = notify
dns-server = 119.29.29.29, 1.1.1.1, 9.9.9.9
skip-proxy = 127.0.0.1/32, 192.168.0.0/16, 10.0.0.0/8
bypass-system = true
tun-excluded-routes = 8.8.8.8,8.8.4.4
ipv6 = false
-remote-tls = true
dns-fallback = 223.5.5.5, 119.29.29.29, 1.0.0.1

[MITM]
hostname = cloudflare.com, google.com apple.com, emby.media, boxjs.net
# 注意这里要处理你要做代理解密的域名，boxjs 和 emby 也包含进来

[Proxy]
# 示例VMESS节点，替换成你自己的节点信息或者订阅链接
节点1 = vmess, hk1.example.com, 443, username=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx, tls=true, skip-cert-verify=true
节点2 = vmess, sg1.example.com, 443, username=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx, tls=true, skip-cert-verify=true
节点3 = ss, jp1.example.com, 8388, encrypt-method=aes-128-gcm, password=yourpassword, udp-relay=true

# 你也可以定义订阅节点组
订阅节点 = http, https://your-subscription-url.com/path, tag=订阅节点, tls=true, skip-cert-verify=true

[Proxy Group]
# 优选自动选择组，自动测速筛选最快节点
AUTO-SELECT = url-test, 订阅节点, interval=300, tolerance=150, url=https://www.gstatic.com/generate_204

# 普通选择节点组
PROXY = select, 节点1, 节点2, 节点3, 订阅节点, AUTO-SELECT

[Rule]
# 先排除日本IP段访问Emby，绕过日本节点，改为直连，不走代理
DOMAIN-SUFFIX,emby.media,PROXY
GEOIP,JP,DIRECT
IP-CIDR,210.130.0.0/16,DIRECT  # 示例日本IP段，确保直连，真实使用时建议用完整的JP IP段

# 其余国内直连
FINAL,PROXY

# 国内流量直连规则
IP-CIDR,10.0.0.0/8,DIRECT
IP-CIDR,192.168.0.0/16,DIRECT
IP-CIDR,172.16.0.0/12,DIRECT
DOMAIN-SUFFIX,cn,DIRECT
DOMAIN-SUFFIX,local,DIRECT
DOMAIN-KEYWORD,localhost,DIRECT

# 广告和隐私保护规则（blackmatrix7广告规则合集）
# 订阅三大广告过滤列表
# QuantumultX在[Filter Remote]中引用

[Filter Remote]
# 这里引用blackmatrix广告、隐私过滤规则
blackmatrix7_ads = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/AD.list, reject
blackmatrix7_privacy = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/UncheckyAds.list, reject
blackmatrix7_malicious = https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/MalwareDomainList.list, reject

[Filter]
# 过滤规则启用
ADS = reject, ip-cidr, private
PRIVACY = reject, ip-cidr, private

[Script]
# boxjs 脚本，用于管理脚本和配置
# path填写你本地boxjs主脚本路径
boxjs = type=http-response, pattern=^https:\/\/boxjs\.net\/api\/, script-path=boxjs.js, requires-body=true[URL Rewrite]
# 你可以写一些urlrewrite规则（视情况）

# 以下是一个范例：请求boxjs接口时替换host
^https:\/\/boxjs\.net\/api\/ url reject

