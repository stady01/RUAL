[general]
server_check_url=http://www.google.com/generate_204
server_check_timeout=3000
profile_img_url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/author/fmz200-01.png
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/fmz200/wool_scripts/main/QuantumultX/scripts/server_location.js
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com
excluded_routes=239.255.255.250/32
fallback_udp_policy=direct
udp_drop_list=443

[dns]
no-ipv6
server=223.5.5.5
server=119.29.29.29
server=114.114.114.114
server=8.8.8.8

[policy]
url-latency-benchmark=⚡️ 全局自动, server-tag-regex=.*, check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Speed_01.png
url-latency-benchmark=⚡️ 香港自动, server-tag-regex=.*(港|HK|Hong), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/HK_01.png
url-latency-benchmark=⚡️ 狮城自动, server-tag-regex=.*(新|SG|Singapore|狮城), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/SG_01.png
url-latency-benchmark=⚡️ 美国自动, server-tag-regex=.*(美|US|States), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/US_01.png
url-latency-benchmark=⚡️ Emby自动, server-tag-regex=^(?!.*(日|JP|Japan|Tokyo|Osaka)).*$, check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Emby_01.png

static=🌐 默认代理, ⚡️ 全局自动, 🇭🇰 香港, 🇸🇬 狮城, 🇺🇸 美国, server-tag-regex=.*, direct, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Global_01.png
static=🇭🇰 香港, ⚡️ 香港自动, server-tag-regex=.*(港|HK|Hong), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/HK_01.png
static=🇸🇬 狮城, ⚡️ 狮城自动, server-tag-regex=.*(新|SG|Singapore|狮城), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/SG_01.png
static=🇺🇸 美国, ⚡️ 美国自动, server-tag-regex=.*(美|US|States), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/US_01.png
static=🎬 Emby服务, ⚡️ Emby自动, 🇭🇰 香港, 🇸🇬 狮城, 🇺🇸 美国, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Emby_01.png

static=🍎 苹果服务, direct, 🌐 默认代理, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Apple_01.png
static=🐟 漏网之鱼, direct, 🌐 默认代理, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Final_01.png

