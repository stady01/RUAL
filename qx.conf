# ==========================================
# Quantumult X 现代化全局配置 (地区分流智能版)
# 核心架构: fmz200/wool_scripts + KOP-XIAO + Blackmatrix7
# ==========================================

[general]
;【基础设置】
server_check_url=http://www.google.com/generate_204
server_check_timeout=3000
profile_img_url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/author/fmz200-01.png
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/fmz200/wool_scripts/main/QuantumultX/scripts/server_location.js
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com
excluded_routes=239.255.255.250/32
fallback_udp_policy=direct
udp_drop_list=443

[dns]
;【DNS 设定】
no-ipv6
server=223.5.5.5
server=119.29.29.29
server=114.114.114.114
server=8.8.8.8
server=/itunes.apple.com/system

[policy]
;【策略组设定】

; ====================
; 1. 全局与综合组 (匹配所有节点)
; ====================
static=🚀 全局手动, proxy, direct, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/proxy_01.png
url-latency-benchmark=⚡️ 全局优选, server-tag-regex=.*, check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Speed_01.png

; ====================
; 2. 地区分类 - 自动优选组 (通过正则自动抓取对应地区节点测速)
; ====================
url-latency-benchmark=⚡️ 香港自动, server-tag-regex=.*(港|HK|Hong), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/HK_01.png
url-latency-benchmark=⚡️ 台湾自动, server-tag-regex=.*(台|TW|Tai), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/TW_01.png
url-latency-benchmark=⚡️ 狮城自动, server-tag-regex=.*(新|SG|Singapore|狮城), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/SG_01.png
url-latency-benchmark=⚡️ 日本自动, server-tag-regex=.*(日|JP|Japan), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/JP_01.png
url-latency-benchmark=⚡️ 美国自动, server-tag-regex=.*(美|US|States), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/US_01.png

; ====================
; 3. 地区分类 - 手动切换组 (通过正则自动抓取对应地区节点供手动选择)
; ====================
static=🇭🇰 香港节点, server-tag-regex=.*(港|HK|Hong), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/HK_01.png
static=🇨🇳 台湾节点, server-tag-regex=.*(台|TW|Tai), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/TW_01.png
static=🇸🇬 狮城节点, server-tag-regex=.*(新|SG|Singapore|狮城), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/SG_01.png
static=🇯🇵 日本节点, server-tag-regex=.*(日|JP|Japan), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/JP_01.png
static=🇺🇸 美国节点, server-tag-regex=.*(美|US|States), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/US_01.png

; ====================
; 4. 全局路由中枢与场景分流
; ====================
; 将所有地区组汇总到默认代理中，方便一键切换总出口
static=🌐 默认代理, ⚡️ 全局优选, 🚀 全局手动, ⚡️ 香港自动, 🇭🇰 香港节点, ⚡️ 狮城自动, 🇸🇬 狮城节点, ⚡️ 日本自动, 🇯🇵 日本节点, ⚡️ 美国自动, 🇺🇸 美国节点, ⚡️ 台湾自动, 🇨🇳 台湾节点, direct, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Global_01.png

static=🍎 苹果服务, direct, 🌐 默认代理, 🇺🇸 美国节点, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Apple_01.png
static=🎬 全球媒体, 🌐 默认代理, ⚡️ 全局优选, 🇭🇰 香港节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇸 美国节点, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/GlobalMedia_01.png
static=📺 国内媒体, direct, 🌐 默认代理, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/ChinaMedia_01.png
static=✈️ Telegram, 🌐 默认代理, ⚡️ 狮城自动, 🇸🇬 狮城节点, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Telegram_01.png
static=🐟 漏网之鱼, 🌐 默认代理, direct, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Final_01.png

[server_remote]
;【节点订阅】
; 请在此处粘贴机场订阅链接。注意：为了让“全局手动”能读到所有节点，需要挂载到 🚀 全局手动。
; 示例：
; https://你的订阅链接, tag=主用机场, force-policy=🚀 全局手动, update-interval=86400, opt-parser=true

[filter_remote]
;【核心分流规则】
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Apple/Apple.list, tag=苹果服务, force-policy=🍎 苹果服务, update-interval=172800, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Microsoft/Microsoft.list, tag=微软服务, force-policy=direct, update-interval=172800, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Telegram/Telegram.list, tag=Telegram, force-policy=✈️ Telegram, update-interval=172800, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/GitHub/GitHub.list, tag=GitHub, force-policy=🌐 默认代理, update-interval=172800, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/GlobalMedia/GlobalMedia.list, tag=全球媒体, force-policy=🎬 全球媒体, update-interval=172800, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/ChinaMedia/ChinaMedia.list, tag=国内媒体, force-policy=📺 国内媒体, update-interval=172800, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Global/Global.list, tag=全球代理, force-policy=🌐 默认代理, update-interval=172800, enabled=true
https://github.com/fmz200/wool_scripts/raw/main/Loon/rule/GeoIP_CN.list, tag=GeoIP_CN@奶思, force-policy=direct, update-interval=86400, opt-parser=true, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/China/China.list, tag=国内直连, force-policy=direct, update-interval=172800, enabled=true

[rewrite_remote]
;【高阶模块与净化】
https://github.com/fmz200/wool_scripts/raw/main/QuantumultX/rewrite/weibo.snippet, tag=微博去广告@奶思, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/app2smile/rules/master/module/spotify.conf, tag=Spotify音乐VIP@app2smile, update-interval=86400, opt-parser=false, enabled=true
https://github.com/chavyleung/scripts/raw/master/box/rewrite/boxjs.rewrite.quanx.conf, tag=BoxJs, update-interval=86400, opt-parser=false, enabled=true
https://github.com/sub-store-org/Sub-Store/raw/master/config/QX.snippet, tag=Sub-Store, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/Script-Hub-Org/Script-Hub/main/modules/script-hub.beta.qx.conf, tag=Script-Hub, update-interval=86400, opt-parser=false, enabled=true

[server_local]

[filter_local]
;【局域网直连与兜底规则】
ip-cidr, 192.168.0.0/16, direct
ip-cidr, 10.0.0.0/8, direct
ip-cidr, 172.16.0.0/12, direct
ip-cidr, 127.0.0.0/8, direct
ip6-cidr, fe80::/10, direct
final, 🐟 漏网之鱼

[rewrite_local]

[task_local]
;【UI 交互与节点分析脚本】
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/streaming-ui-check.js, tag=流媒体-解锁查询, img-url=checkmark.seal.system, enabled=true
event-interaction https://raw.githubusercontent.com/I-am-R-E/Functional-Store-Hub/Master/NodeLinkCheck/Script/NodeLinkCheck.js, tag=Env代理链路检测, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Stack.png, enabled=true
event-interaction https://raw.githubusercontent.com/fmz200/wool_scripts/main/QuantumultX/scripts/server_info.js, tag=节点详情查询, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/ipInfo.png, enabled=true
event-interaction https://raw.githubusercontent.com/getsomecat/Qx/main/Net_Speed.js, tag=⚡️节点速度测试, img-url=bolt.square.fill.system, enabled=true
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/traffic-check.js, tag=策略流量查询, img-url=arrow.up.arrow.down.circle.system, enabled=true

[mitm]
;【MitM 证书解密】
skip_validating_cert = true
hostname = -www.google.com
