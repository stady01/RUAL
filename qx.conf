# ==========================================
# Quantumult X 地区分流版 (精简地区组 + Emby优选)
# 修复 HTML 报错 + 全自动抓取节点 + 兜底直连
# ==========================================

[general]
server_check_url=http://www.google.com/generate_204
server_check_timeout=3000
profile_img_url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/author/fmz200-01.png
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/fmz200/wool_scripts/main/QuantumultX/scripts/server_location.js
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com
excluded_routes=239.255.255.250/32
fallback_udp_policy=direct
udp_drop_list=443

[dns]
no-ipv6
server=223.5.5.5
server=119.29.29.29
server=114.114.114.114
server=8.8.8.8
server=/itunes.apple.com/system

[policy]
; ====================
; 1. 隐藏底层测速组 (自动抓取节点，但不显示在主界面)
; ====================
url-latency-benchmark=⚡️ 全局测速, server-tag-regex=.*, check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Speed_01.png
url-latency-benchmark=⚡️ Emby测速, server-tag-regex=^(?!.*(日|JP|Japan|Tokyo|Osaka)).*$, check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Emby_01.png
url-latency-benchmark=⚡️ 香港测速, server-tag-regex=.*(港|HK|Hong), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/HK_01.png
url-latency-benchmark=⚡️ 狮城测速, server-tag-regex=.*(新|SG|Singapore|狮城), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/SG_01.png
url-latency-benchmark=⚡️ 美国测速, server-tag-regex=.*(美|US|States), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/US_01.png

; ====================
; 2. 地区节点选择组 (自动抓取特定地区节点，供你手动挑选)
; ====================
static=🇭🇰 香港节点, server-tag-regex=.*(港|HK|Hong), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/HK_01.png
static=🇸🇬 狮城节点, server-tag-regex=.*(新|SG|Singapore|狮城), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/SG_01.png
static=🇺🇸 美国节点, server-tag-regex=.*(美|US|States), img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/US_01.png
static=🚀 其他节点, server-tag-regex=^(?!.*(港|HK|Hong|新|SG|Singapore|狮城|美|US|States)).*$, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/proxy_01.png

; ====================
; 3. 主界面路由控制面板
; ====================
; 全局总开关：在这里一键决定全局走哪个地区的测速，或者哪个地区的手动组
static=🌐 默认代理, ⚡️ 全局测速, ⚡️ 香港测速, 🇭🇰 香港节点, ⚡️ 狮城测速, 🇸🇬 狮城节点, ⚡️ 美国测速, 🇺🇸 美国节点, 🚀 其他节点, direct, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Global_01.png

; Emby 专线
static=🎬 Emby服务, ⚡️ Emby测速, 🌐 默认代理, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Emby_01.png

; 苹果服务
static=🍎 苹果服务, direct, 🌐 默认代理, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Apple_01.png

; 兜底流量 (默认直连，节省流量)
static=🐟 漏网之鱼, direct, 🌐 默认代理, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Final_01.png

[server_remote]
; 你的机场订阅链接，无需特殊 force-policy，节点会自动被正则抓取分配到上面的地区组里。
; https://example.com/sub, tag=机场订阅, update-interval=86400, opt-parser=true

[filter_remote]
;【核心分流规则】
# > Emby 专线
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Emby/Emby.list, tag=Emby服务, force-policy=🎬 Emby服务, update-interval=172800, enabled=true

# > 苹果与微软服务
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Apple/Apple.list, tag=苹果服务, force-policy=🍎 苹果服务, update-interval=172800, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Microsoft/Microsoft.list, tag=微软服务, force-policy=direct, update-interval=172800, enabled=true

# > 海外流量汇总 (电报、流媒体、全球统一走默认代理)
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Telegram/Telegram.list, tag=Telegram, force-policy=🌐 默认代理, update-interval=172800, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/GlobalMedia/GlobalMedia.list, tag=全球媒体, force-policy=🌐 默认代理, update-interval=172800, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Global/Global.list, tag=全球代理, force-policy=🌐 默认代理, update-interval=172800, enabled=true

# > 国内流量汇总 (全部强制直连)
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/ChinaMedia/ChinaMedia.list, tag=国内媒体, force-policy=direct, update-interval=172800, enabled=true
https://raw.githubusercontent.com/fmz200/wool_scripts/main/Loon/rule/GeoIP_CN.list, tag=GeoIP_CN@奶思, force-policy=direct, update-interval=86400, opt-parser=true, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/China/China.list, tag=国内直连, force-policy=direct, update-interval=172800, enabled=true

[rewrite_remote]
;【高阶模块与净化】
https://raw.githubusercontent.com/fmz200/wool_scripts/main/QuantumultX/rewrite/weibo.snippet, tag=微博去广告@奶思, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/app2smile/rules/master/module/spotify.conf, tag=Spotify音乐VIP@app2smile, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/chavyleung/scripts/master/box/rewrite/boxjs.rewrite.quanx.conf, tag=BoxJs, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/sub-store-org/Sub-Store/master/config/QX.snippet, tag=Sub-Store, update-interval=86400, opt-parser=false, enabled=true

[server_local]

[filter_local]
;【局域网直连与兜底规则】
ip-cidr, 192.168.0.0/16, direct
ip-cidr, 10.0.0.0/8, direct
ip-cidr, 172.16.0.0/12, direct
ip-cidr, 127.0.0.0/8, direct
ip6-cidr, fe80::/10, direct
final, 🐟 漏网之鱼

[rewrite_local]

[task_local]
;【UI 交互与节点分析脚本】
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/streaming-ui-check.js, tag=流媒体-解锁查询, img-url=checkmark.seal.system, enabled=true
event-interaction https://raw.githubusercontent.com/I-am-R-E/Functional-Store-Hub/Master/NodeLinkCheck/Script/NodeLinkCheck.js, tag=Env代理链路检测, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Stack.png, enabled=true
event-interaction https://raw.githubusercontent.com/fmz200/wool_scripts/main/QuantumultX/scripts/server_info.js, tag=节点详情查询, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/ipInfo.png, enabled=true
event-interaction https://raw.githubusercontent.com/getsomecat/Qx/main/Net_Speed.js, tag=⚡️节点速度测试, img-url=bolt.square.fill.system, enabled=true
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/traffic-check.js, tag=策略流量查询, img-url=arrow.up.arrow.down.circle.system, enabled=true

[mitm]
;【MitM 证书解密】
skip_validating_cert = true
hostname = -www.google.com
